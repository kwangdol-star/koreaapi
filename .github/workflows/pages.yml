# Public GEO page (answer-engine-crawlable) on GitHub Pages.
# Builds report.html + monitor.html from LIVE data (the pull runs on GitHub's open-network
# runner) and deploys to GitHub Pages — a free, public, JSON-LD-bearing URL that
# Perplexity / ChatGPT / Google AI Overviews can crawl and cite.
#
# ONE-TIME ENABLE: repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
name: pages

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  schedule:
    - cron: "37 1 * * *" # daily, after the collect job
  workflow_run: # rebuild right after collect finishes, so the site reflects the freshly-accumulated DB
    workflows: ["collect"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (Python env)
        uses: astral-sh/setup-uv@v5

      # Read the DB that `collect` accumulated (discovery's "10x") so the SITE reflects it, not just
      # the seed roster. Read-only restore (collect is the writer); restore-keys picks the newest.
      - name: Restore accumulated DB
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/koreaapi.db
          key: koreaapi-db-pages-${{ github.run_id }}
          restore-keys: |
            koreaapi-db-

      - name: Build the public GEO page from live data
        env:
          PYTHONPATH: src
          KOREAAPI_DB: ${{ runner.temp }}/koreaapi.db  # the accumulated DB restored above
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # romanization + Circle Chart extract (best-effort; skipped if unset)
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }} # official-channel release snapshots (best-effort; skipped if unset)
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }} # 3rd-source cross-check for drama/film/animation (skipped if unset)
          TOURAPI_KEY: ${{ secrets.TOURAPI_KEY }} # KTO official place-authority source + badge (skipped if unset)
        run: |
          uv sync
          uv pip install opentimestamps-client || echo "ots install skipped — Bitcoin anchoring stays dormant"  # enable OpenTimestamps (free, keyless) so admin export anchors the integrity chain-head
          # SELF-HEAL first (same as collect): if the cache was evicted, re-seed from the LIVE
          # /latest.json — otherwise this build would be roster-only and OVERWRITE the live corpus
          # (destroying bootstrap's own recovery source). Belt: the verifysite gate below at 1000.
          uv run python -m koreaapi.admin bootstrap
          uv run python -m koreaapi.admin pull
          uv run python -m koreaapi.admin sweep
          uv run python -m koreaapi.admin chart
          uv run python -m koreaapi.admin youtube
          uv run python -m koreaapi.admin report
          uv run python -m koreaapi.admin entitypages
          uv run python -m koreaapi.admin digest
          uv run python -m koreaapi.admin llms   # regenerate /llms.txt from live data (roster + people)
          uv run python -m koreaapi.admin llmsfull   # full LLM-ingestible corpus at /llms-full.txt
          uv run python -m koreaapi.admin feed   # RSS + JSON freshness feeds (recently verified)
          uv run python -m koreaapi.admin reconcile   # entity reconciliation index (/reconcile.json)
          uv run python -m koreaapi.admin status   # health/freshness snapshot (/status.json)
          uv run python -m koreaapi.admin monitor
          uv run python -m koreaapi.admin export
          mkdir -p _site
          cp report.html _site/index.html
          cp monitor.html _site/monitor.html   # human data-quality cockpit at /monitor.html
          cp llms*.txt _site/   # /llms.txt index + /llms-full.txt + per-vertical llms-<v>.txt chunks (glob — no per-file list)
          cp reconcile.json _site/reconcile.json   # reconciliation index (name/external-ID -> canonical entity)
          cp status.json _site/status.json   # health/freshness snapshot
          cp feed.xml _site/feed.xml   # RSS freshness feed at /feed.xml
          cp feed.json _site/feed.json   # JSON Feed at /feed.json
          cp data/korea-rising.md _site/korea-rising.md   # shareable verified digest
          cp data/latest.json _site/latest.json   # open machine-readable verified data
          cp data/openapi.json _site/openapi.json   # OpenAPI 3.1 spec — auto-consumable HTTP API contract
          cp data/changes.json _site/changes.json   # verified change feed (소속사 moves, renames) — advertised in agents.json/llms.txt
          cp data/certified.json _site/certified.json   # official rights-holder certification registry (supply-side)
          cp data/integrity.json _site/integrity.json   # tamper-evident dataset hash + history chain head
          cp data/integrity-log.jsonl _site/integrity-log.jsonl   # public append-only attestation log (git-timestamped heads)
          cp data/integrity-head.txt* _site/ 2>/dev/null || true   # OpenTimestamps Bitcoin proof of the chain-head (only when anchoring is enabled)
          cp robots.txt _site/robots.txt   # explicitly welcome answer-engine crawlers (AEO)
          cp CNAME _site/CNAME   # bind the custom domain (aiagentlabs.co.kr) on every deploy — the GEO authority host
          cp googleb476fa8c4c3cccf0.html _site/   # Google Search Console site verification (file method)
          cp -r site/artist _site/artist   # per-entity citable answer pages (/artist/<slug>.html)
          cp -r site/badge _site/badge   # embeddable "Verified by KoreaAPI" SVG badges (/badge/<slug>.svg)
          cp -r site/ko _site/ko   # Korean-led answer pages + /ko/ home (hreflang, 네이버/국내 질의)
          cp site/methodology.html site/for-agents.html site/agents.json site/pricing.html site/certify.html _site/   # trust + quickstart + manifest + pricing + certify storefront
          cp site/search-index.json _site/search-index.json   # client-side search index (search.html fetches it; *.html glob below misses .json)
          cp -r site/.well-known _site/.well-known   # /.well-known/agent.json — the machine front door (dot-dir: no glob catches it)
          cp -r site/person _site/person   # per-person credit pages (/person/<slug>.html)
          cp -r site/label _site/label   # per-label/agency/network hub pages (/label/<slug>.html)
          cp site/*.html _site/   # every generated top-level hub + standalone page (glob — no per-vertical list)
          uv run python -m koreaapi.admin sitemap   # sitemap.xml incl. every entity + person page (daily lastmod)
          cp sitemap.xml _site/sitemap.xml
          # PRE-DEPLOY GATE: validate the assembled _site (index size, sitemap, search index, entity-page
          # counts, key files). A generator regression or a lost DB cache FAILS the build here, and
          # GitHub Pages keeps serving the previous good deployment — freeze beats broken.
          uv run python -m koreaapi.admin verifysite _site 1000
          #   1000 > the ~658-entity roster: a cache-evicted, bootstrap-failed build CANNOT pass and
          #   overwrite the live corpus with a skeleton. (True cold-start bring-up: run with a lower
          #   threshold manually once, e.g. `verifysite _site 100`.)

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3 # publishes ./_site by default
      - id: deploy
        uses: actions/deploy-pages@v4
