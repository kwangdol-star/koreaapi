# KoreaAPI daily collector — the cold-start data engine.
# Runs the live Wikidata pull + cross-verify + bulk discovery, accumulating the verified DB across
# runs via the GitHub Actions cache (OUT OF GIT). The previous git-commit-to-main approach was wiped
# by the force-push deploy (koreaapi-standalone -> main), so discovery never accumulated; the cache is
# immune to it. GitHub's runners have open network, so the live pull works here.
# Manual run: Actions tab -> "collect" -> Run workflow. Daily schedule active once on the default branch.
name: collect

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 */6 * * *" # every 6h (00:17/06:17/12:17/18:17 UTC) — 4x faster accumulation + discovery

permissions:
  contents: read

concurrency:
  group: koreaapi-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (Python env)
        uses: astral-sh/setup-uv@v5

      - name: Install deps
        run: uv sync

      # Persist the verified DB OUT OF GIT so discovery ACCUMULATES run-over-run. restore-keys
      # prefix-matches the most recent prior run's cache; the unique per-run key lets save always write.
      - name: Restore accumulated DB
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/koreaapi.db
          key: koreaapi-db-${{ github.run_id }}
          restore-keys: |
            koreaapi-db-

      - name: Pull live Wikidata + discover + accumulate
        env:
          PYTHONPATH: src
          KOREAAPI_DB: ${{ runner.temp }}/koreaapi.db # persisted across runs via the cache above
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # romanization + Circle Chart extract (best-effort; skipped if unset)
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }} # official-channel release snapshots (best-effort; skipped if unset)
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }} # 3rd-source cross-check for drama/film/animation (skipped if unset)
          TOURAPI_KEY: ${{ secrets.TOURAPI_KEY }} # KTO official place-authority source + badge (skipped if unset)
        run: |
          uv run python -m koreaapi.admin pull
          uv run python -m koreaapi.admin sweep
          uv run python -m koreaapi.admin discover  # bulk-discover each vertical's Korean entities (10x)
          uv run python -m koreaapi.admin chart
          uv run python -m koreaapi.admin youtube
          uv run python -m koreaapi.admin export
          uv run python -m koreaapi.admin digest
          uv run python -m koreaapi.admin stats

      # Save the accumulated DB back to the cache (always — even if a step above failed) so the next
      # run resumes from it. This is what makes discovery the "10x" instead of a fresh-per-run reset.
      - name: Save accumulated DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/koreaapi.db
          key: koreaapi-db-${{ github.run_id }}
